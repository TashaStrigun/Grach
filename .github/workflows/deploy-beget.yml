name: Deploy to Beget

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-grach-studio
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public site
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.BEGET_FTP_SERVER }}
          username: ${{ secrets.BEGET_FTP_USERNAME }}
          password: ${{ secrets.BEGET_FTP_PASSWORD }}
          local-dir: ./
          server-dir: /grach-studio.ru/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*/**
            **/node_modules/**
            **/.DS_Store
            **/Thumbs.db
            **/*.log
            server.mjs
            vercel.json
            api/send-telegram.js
